name: smartedge_agriguardian
description: "SmartEdge AgriGuardian - AI Powered Crop Advisory System"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # UI & Icons
  cupertino_icons: ^1.0.6

  # Camera (Leaf Disease Scan)
  camera: 0.10.5+9
  image_picker: ^1.1.2

  # Voice (Speech-to-Text + Text-to-Speech)
  speech_to_text: ^7.0.0
  flutter_tts: ^4.0.2

  # Networking (Backend calls - weather, knowledge base, Ollama)
  http: ^1.2.2
  dio: ^5.7.0

  # State Management
  provider: ^6.1.2

  # Charts / Graphs (Health Score trend, Moisture trend)
  fl_chart: ^0.69.0

  # Maps (VEDAS NDVI overlay, Farm Map)
  flutter_map: ^7.0.2
  latlong2: ^0.9.1

  # Local Storage (Offline mode, history)
  shared_preferences: ^2.3.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Environment variables (API keys - never hardcode)
  flutter_dotenv: ^5.2.1

  # Permissions (Camera, Microphone, Location)
  permission_handler: ^11.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  assets:
    - .env
    - assets/images/
    - assets/models/